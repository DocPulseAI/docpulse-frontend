<svg width="240" height="240" viewBox="0 0 240 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="brandGradient" x1="0" y1="0" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#63B3ED" />
      <stop offset="50%" stop-color="#4299E1" />
      <stop offset="100%" stop-color="#3182CE" />
    </linearGradient>
    <linearGradient id="lineGradient" x1="0" y1="0" x2="240" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#63B3ED" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#63B3ED" stop-opacity="0.2" />
    </linearGradient>
  </defs>

  <!-- Left Vertical Spine -->
  <path d="M60 60 V180" stroke="url(#brandGradient)" stroke-width="6" stroke-linecap="round" filter="url(#glow)"/>
  
  <!-- Left Nodes -->
  <circle cx="60" cy="60" r="10" fill="#1A202C" stroke="url(#brandGradient)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="60" cy="120" r="10" fill="#1A202C" stroke="url(#brandGradient)" stroke-width="3" filter="url(#glow)"/>
  <circle cx="60" cy="180" r="10" fill="#1A202C" stroke="url(#brandGradient)" stroke-width="3" filter="url(#glow)"/>

  <!-- Connections to Hub -->
  <path d="M60 60 L120 120" stroke="url(#brandGradient)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M60 180 L120 120" stroke="url(#brandGradient)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  <path d="M60 120 H120" stroke="url(#brandGradient)" stroke-width="4" stroke-linecap="round" opacity="0.6"/>

  <!-- Hub Node -->
  <circle cx="120" cy="120" r="8" fill="url(#brandGradient)" filter="url(#glow)"/>

  <!-- Horizontal Data Paths -->
  <path d="M120 120 H200" stroke="url(#lineGradient)" stroke-width="4" stroke-linecap="round"/>
  <path d="M60 60 H200" stroke="url(#lineGradient)" stroke-width="4" stroke-linecap="round"/>
  <path d="M60 180 H200" stroke="url(#lineGradient)" stroke-width="4" stroke-linecap="round"/>

  <!-- Terminal Nodes -->
  <circle cx="200" cy="60" r="12" fill="url(#brandGradient)" filter="url(#glow)"/>
  <circle cx="200" cy="120" r="12" fill="url(#brandGradient)" filter="url(#glow)"/>
  <circle cx="200" cy="180" r="12" fill="url(#brandGradient)" filter="url(#glow)"/>

  <!-- Micro-pulse details -->
  <path d="M140 85 H170 L180 95 H210" stroke="#63B3ED" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <path d="M130 145 H160 L170 155 H200" stroke="#63B3ED" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
</svg>

